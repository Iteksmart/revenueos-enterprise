name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Production smoke
        if: ${{ github.event_name == 'push' && secrets.REVENUEOS_WORKER_TOKEN != '' }}
        run: npm run smoke:prod
        env:
          REVENUEOS_BASE_URL: https://revenueos.itechsmart.dev
          REVENUEOS_WORKER_TOKEN: ${{ secrets.REVENUEOS_WORKER_TOKEN }}
